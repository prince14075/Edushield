<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recover Account - EduShield</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

  <div class="align-center" style="min-height: 100vh; flex-direction: column; justify-content: center; padding: 3rem 1.5rem;">
    <div class="sm:mx-auto sm:w-full sm:max-w-md text-center" style="margin-bottom: 2.5rem;">
      <div class="inline-flex items-center justify-center h-14 w-14 rounded-full" style="background-color: var(--color-primary-light); color: var(--color-primary); mb-4">
        <i data-lucide="shield-alert" style="width: 1.75rem; height: 1.75rem;"></i>
      </div>
      <h2 class="form-title" style="margin-top: 1rem;">Recover Your Account</h2>
      <p class="form-desc">Reset your password securely over encrypted channels.</p>
    </div>

    <div class="form-container" style="max-width: 30rem;">
      <div class="panel" style="padding: 2.5rem; border-radius: var(--radius-lg);">
        
        <!-- Step 1: Identifier Form -->
        <form id="step-1-form" class="form-step active form-box">
          <div class="form-field">
            <label for="identifier" class="form-label">Registered Email or Mobile Number</label>
            <input type="text" id="identifier" required placeholder="example@mail.com or 9876543210" class="form-input">
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%; border-radius: var(--radius-sm);">
            <span>Send Verification Code</span>
            <div class="spinner" id="s1-spinner" style="display: none;"></div>
          </button>
        </form>

        <!-- Step 2: OTP Form -->
        <form id="step-2-form" class="form-step form-box" style="text-align: center;">
          <p class="form-desc" style="margin-bottom: 1.5rem;">
            We sent a 6-digit code to<br>
            <strong id="sent-identifier-text" style="color: var(--color-slate-900);"></strong>
          </p>
          <div class="form-field">
            <label for="otp" class="form-label" style="text-align: left;">Enter 6-digit Security Code</label>
            <input type="text" id="otp" required maxlength="6" class="form-input" style="text-align: center; font-family: monospace; letter-spacing: 0.5em; font-size: 1.5rem; padding: 0.5rem;">
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%; border-radius: var(--radius-sm); margin-top: 1rem;">
            <span>Verify Code</span>
            <div class="spinner" id="s2-spinner" style="display: none;"></div>
          </button>
          <button type="button" class="btn btn-secondary back-to-s1" style="width: 100%; border-radius: var(--radius-sm); margin-top: 0.5rem;">
            <i data-lucide="arrow-left" style="width: 1rem; height: 1rem;"></i>
            Back
          </button>
        </form>

        <!-- Step 3: Reset Password Form -->
        <form id="step-3-form" class="form-step form-box">
          <div class="alert-box alert-success" style="margin-bottom: 1.5rem;">
            <i data-lucide="check-circle-2" style="width: 1.25rem; height: 1.25rem; flex-shrink: 0;"></i>
            <span>Identity verified successfully. You may now reset your password.</span>
          </div>
          
          <div class="form-field">
            <label for="newPassword" class="form-label">New Secure Password</label>
            <input type="password" id="newPassword" required minlength="6" class="form-input">
          </div>

          <div class="form-field">
            <label for="confirmPassword" class="form-label">Confirm New Password</label>
            <input type="password" id="confirmPassword" required minlength="6" class="form-input">
          </div>

          <button type="submit" class="btn btn-primary" style="width: 100%; border-radius: var(--radius-sm); margin-top: 1.5rem;">
            <span>Confirm Password Change</span>
            <div class="spinner" id="s3-spinner" style="display: none;"></div>
          </button>
        </form>

      </div>

      <p class="form-desc" style="text-align: center; margin-top: 2rem;">
        <a href="/login" style="color: var(--color-primary); font-weight: 700;">Return to main login portal</a>
      </p>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/forgot-password.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    lucide.createIcons();
  </script>
</body>
</html>
