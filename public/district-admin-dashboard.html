<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>District Admin Dashboard - EduShield</title>
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    .deo-card {
      background-color: #fff;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 2rem;
      box-shadow: var(--shadow-sm);
      transition: var(--transition);
      margin-bottom: 2rem;
    }
    .deo-card:hover {
      box-shadow: var(--shadow-md);
    }
    .deo-grid {
      display: grid;
      gap: 1.5rem;
      grid-template-cols: 1fr;
    }
    @media (min-width: 1024px) {
      .deo-grid { grid-template-cols: 3fr 1fr; }
    }
    .deo-info-panel {
      display: grid;
      grid-template-cols: 1fr;
      gap: 1rem;
      background-color: var(--color-slate-50);
      border: 1px solid var(--border-color);
      padding: 1.25rem;
      border-radius: var(--radius-md);
    }
    @media (min-width: 640px) {
      .deo-info-panel { grid-template-cols: 1fr 1fr; }
    }
    .action-panel {
      display: flex;
      flex-direction: row;
      gap: 1rem;
      align-items: stretch;
      min-width: 16rem;
    }
    @media (min-width: 1024px) {
      .action-panel {
        flex-direction: column;
        border-left: 1px solid var(--border-color);
        padding-left: 1.5rem;
        justify-content: center;
      }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header-navbar">
    <div class="container nav-container">
      <a href="/" class="logo-link">
        <i data-lucide="shield" class="logo-icon"></i>
        <span>EduShield</span>
      </a>
      <div class="align-center" style="gap: 1.5rem;">
        <button class="btn btn-secondary sign-out-btn" style="border-radius: var(--radius-sm); font-size: 0.8rem; padding: 0.5rem 1rem;">
          <i data-lucide="log-out" style="width: 1.1rem; height: 1.1rem; color: var(--color-slate-400);"></i>
          Sign Out
        </button>
      </div>
    </div>
  </header>

  <main class="container" style="padding: 3rem 1.5rem;">
    
    <div class="justify-between align-center" style="margin-bottom: 3rem; flex-wrap: wrap; gap: 1rem;">
      <div>
        <h2 class="form-title" style="font-size: 1.85rem; border-left: 4px solid var(--color-primary); padding-left: 0.75rem;">District Admin Dashboard</h2>
        <p class="form-desc" style="font-size: 0.95rem; margin-top: 0.25rem; padding-left: 1rem;">
          Review and officially approve incoming Coaching Institute registrations.
        </p>
      </div>
      <div style="text-align: right;">
        <p class="testing-title">Pending Applications</p>
        <p style="font-size: 2.25rem; font-weight: 900; color: var(--color-primary); line-height: 1;" id="pending-counter">0</p>
      </div>
    </div>

    <!-- Loading, Empty and Queue lists -->
    <div id="deo-loading" style="text-align: center; padding: 4rem 0;">
      <div class="spinner" style="width: 2.5rem; height: 2.5rem; border-top-color: var(--color-primary); border-width: 4px; margin: 0 auto;"></div>
      <p style="margin-top: 1rem; color: var(--color-slate-500);">Loading pending registrations...</p>
    </div>

    <div id="deo-empty" class="panel" style="display: none; padding: 4rem; text-align: center; border-radius: var(--radius-lg);">
      <i data-lucide="check-circle-2" style="width: 3rem; height: 3rem; color: var(--color-emerald); margin: 0 auto 1rem;"></i>
      <h3 style="font-size: 1.25rem; font-weight: 800; margin-bottom: 0.5rem;">All Caught Up!</h3>
      <p style="color: var(--color-slate-500); max-width: 26rem; margin: 0 auto;">
        There are no pending institute registrations to review at the moment.
      </p>
    </div>

    <div id="deo-queue-list"></div>

  </main>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/district-admin-dashboard.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    lucide.createIcons();
  </script>
</body>
</html>
